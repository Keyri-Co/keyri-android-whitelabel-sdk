name: Firebase Instrumentation Tests

on:
  push:
    branches:
      - 'feature/new_auth_flow'

jobs:
  assemble_ui_test_artifacts:
    name: Build artifacts
    runs-on: ubuntu-20.04
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '11'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build APK for UI test
        run: ./gradlew keyrisdk:assembleDebugAndroidTest

      - name: Upload app-debug APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload keyrisdk-debug-androidTest APK
        uses: actions/upload-artifact@v3
        with:
          name: keyrisdk-debug-androidTest
          path: keyrisdk/**/keyrisdk-debug-androidTest.apk

  run_ui_tests_on_firebase:
    runs-on: ubuntu-20.04
    needs: assemble_ui_test_artifacts
    steps:
      - uses: actions/checkout@v3
      - name: Download app-debug APK
        uses: actions/download-artifact@v3
        with:
          name: app-debug
          path: artifacts

      - name: Download keyrisdk-debug-androidTest APK
        uses: actions/download-artifact@v3
        with:
          name: keyrisdk-debug-androidTest
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R
        working-directory: artifacts

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v0
        with:
          credentials_json: ${{ secrets.FIREBASE_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v0.6.0

      - name: Use gcloud CLI
        run: gcloud info

      - name: Run Instrumentation Tests in Firebase Test Lab
        run: |
          gcloud firebase test android models list
          gcloud firebase test android run --type instrumentation --app "artifacts/app-debug.apk" --test "artifacts/**/keyrisdk-debug-androidTest.apk" --device model=Pixel3,version=30,locale=en,orientation=portrait --timeout 180s