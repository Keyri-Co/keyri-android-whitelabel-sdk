name: Instrumentation Tests

on:
  push:
    branches:
      - 'feature/new_auth_flow'

jobs:
  android_tests:
    runs-on: macos-latest
    strategy:
      matrix:
        api-level: [ 31 ]
        target: [ google_apis ]
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: Set up Java
        with:
          java-version: '11'
          distribution: 'adopt'
      - uses: actions/checkout@v2
      - name: Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          script: ./gradlew connectedAndroidTest
