    defaultConfig {
        applicationId "com.keyri"
        minSdkVersion cfg.minSdkVersion
        targetSdkVersion cfg.targetSdkVersion
        versionCode 1
        versionName "1.0"

        buildConfigField "String", "APP_KEY", "\"qUQ9DX176JT9JdQwK7N2XhRJ35GfJLzv\""
        buildConfigField "String", "PUBLIC_KEY", "\"00uVMpjv0sxLPMovInfRCB5kSX3WPKpx9RKNe3HFnTE=\""
        buildConfigField "String", "KEYRI_CALLBACK_URL", "\"http://18.234.222.59:5000/users/session-mobile\""
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
