ext {
    configuration = [
            compileSdkVersion: 30,
            minSdkVersion    : 23,
            targetSdkVersion : 30,
    ]

    coroutines = "1.3.9"
    appcompat = "1.2.0"
    corektx = "1.3.1"
    dagger = "2.28.3"
    activity = "1.2.2"
    fragment = "1.3.6"
    lifecycle = "2.3.1"
    liveevent = "1.2.0"
    preference = "1.1.1"
    room = "2.3.0"
    okhttp = "4.8.1"
    okhttplogging = "4.9.0"
    retrofit = "2.9.0"
    gson = "2.8.6"
    recyclerview = "1.1.0"
    qrCodeScanner = '2.1.0'
}

buildscript {
    ext.kotlin_version = '1.5.0'
    repositories {
        google()
        jcenter()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.0.3'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        jcenter()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
