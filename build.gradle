ext {
    configuration = [
            compileSdkVersion: 30,
            minSdkVersion    : 23,
            targetSdkVersion : 30,
    ]

    appCompat = '1.2.0'
    coreKtx = '1.3.1'
    dagger = '2.28.3'
    activity = '1.2.2'
    fragment = '1.3.6'
    lifecycle = '2.3.1'
    liveEvent = '1.2.0'
    room = '2.3.0'
    okHttp = '4.9.1'
    retrofit = '2.9.0'
    gson = '2.8.6'
    recyclerView = '1.2.1'
    qrCodeScanner = '2.1.0'
}

buildscript {
    ext.kotlin_version = '1.5.0'
    repositories {
        google()
        jcenter()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.0.3'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        jcenter()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
