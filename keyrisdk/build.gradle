apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-android-extensions'
apply plugin: 'kotlin-kapt'

def cfg = rootProject.ext.configuration

android {
    compileSdkVersion cfg.compileSdkVersion

    defaultConfig {
        minSdkVersion cfg.minSdkVersion
        targetSdkVersion cfg.targetSdkVersion

        consumerProguardFiles 'consumer-rules.pro'
    }

    buildTypes {
        debug {
            // TODO Configure
//            buildConfigField "String", "API_URL", "\"https://api.keyri.co\""
//            buildConfigField "String", "WS_URL", "\"https://api.keyri.co\""

            buildConfigField "String", "API_URL", "\"https://dev-api.keyri.co\""
            buildConfigField "String", "WS_URL", "\"wss://dev-api.keyri.co\""
        }
        release {
            buildConfigField "String", "API_URL", "\"https://api.keyri.co\""
            buildConfigField "String", "WS_URL", "\"https://api.keyri.co\""

            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8.toString()
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation "androidx.appcompat:appcompat:$appCompat"
    implementation "androidx.core:core-ktx:$coreKtx"

    implementation "androidx.activity:activity-ktx:$activity"

    implementation "androidx.recyclerview:recyclerview:$recyclerView"

    implementation "com.google.dagger:dagger:$dagger"
    kapt "com.google.dagger:dagger-compiler:$dagger"

    implementation(platform("com.squareup.okhttp3:okhttp-bom:$okHttp"))
    implementation "com.squareup.okhttp3:okhttp"
    implementation "com.squareup.okhttp3:logging-interceptor"

    implementation "com.squareup.retrofit2:retrofit:$retrofit"
    implementation "com.squareup.retrofit2:converter-gson:$retrofit"

    implementation "androidx.room:room-runtime:$room"
    implementation "androidx.room:room-ktx:$room"
    kapt "androidx.room:room-compiler:$room"

    implementation "com.goterl:lazysodium-android:5.0.2@aar"
    implementation "net.java.dev.jna:jna:5.8.0@aar"

    implementation ('io.socket:socket.io-client:2.0.1') {
        exclude group: 'org.json', module: 'json'
    }

    implementation "com.google.mlkit:barcode-scanning:$barcode"

    // TODO Change scanner activity UI, icons and actions

    // CameraX
    implementation "androidx.camera:camera-core:$cameraX"
    implementation "androidx.camera:camera-camera2:$cameraX"
    implementation "androidx.camera:camera-lifecycle:$cameraX"
    implementation "androidx.camera:camera-view:$cameraXview"
}
